# Dùng cho Coolify (build pack "Docker Compose") — ZERO CONFIG:
#  • Volume bền `goinuoc-data` được Coolify TỰ TẠO & giữ qua các lần deploy.
#  • AUTH_SECRET TỰ SINH trong entrypoint (lưu bền trên volume) — không cần đặt tay.
# Chạy local: docker compose up --build  (mở http://localhost:3000)
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AUTH_TRUST_HOST: "true"
      # DB SQLite nằm trên volume bền
      DATABASE_URL: "file:/app/data/prod.db"
      SEED_ON_FIRST_BOOT: "true"
      # AUTH_SECRET: để TRỐNG -> entrypoint tự sinh & lưu bền. Chỉ set nếu muốn tự quản.
      AUTH_SECRET: ${AUTH_SECRET:-}
    volumes:
      - goinuoc-data:/app/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  goinuoc-data:
